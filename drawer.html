<body class="bg-surface text-on-surface antialiased h-screen w-screen overflow-hidden flex font-body-rt relative">
<!-- Dimmed Background Overlay -->
<div aria-hidden="true" class="absolute inset-0 bg-on-background/50 backdrop-blur-sm z-40"></div>
<!-- Main Content Canvas (Behind Overlay) -->
<div class="flex-1 h-full p-margin-page overflow-y-auto blur-sm scale-[0.99] transition-transform duration-300">
<!-- Mock Content -->
<h1 class="font-display-lg text-display-lg text-on-surface mb-8">Scout Gallery</h1>
<div class="grid grid-cols-12 gap-gutter-grid">
<div class="col-span-4 h-96 bg-surface-container-high border border-on-surface/10 flex items-center justify-center">
<span class="material-symbols-outlined text-outline text-4xl">image</span>
</div>
<div class="col-span-4 h-96 bg-surface-container-high border border-on-surface/10 flex items-center justify-center">
<span class="material-symbols-outlined text-outline text-4xl">image</span>
</div>
<div class="col-span-4 h-96 bg-surface-container-high border border-on-surface/10 flex items-center justify-center">
<span class="material-symbols-outlined text-outline text-4xl">image</span>
</div>
</div>
</div>
<!-- SideNavBar (Shortlist Drawer) -->
<!-- Applying style_component_shape, style_bg_color, style_separation_logic, style_shell_layout, style_shadows_and_elevation -->

<!-- Header -->
<div class="px-6 py-8 ledger-line flex justify-between items-start">
<div>
<!-- style_brand_logo mapped here for title to maintain hierarchy, though slightly adapted for header -->
<h2 class="font-headline-md text-headline-md text-on-surface">Dossier Console</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-1">Curated Talent Shortlist</p>
</div>
<button aria-label="Close Shortlist" class="p-2 text-on-surface-variant hover:text-on-surface transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'wght' 300;">close</span>
</button>
</div>
<!-- Populated State (Active) -->
<div class="flex-1 overflow-y-auto" id="populated-state">
<ul class="flex flex-col">
<!-- Item 1: Julian Thorne -->
<li class="shortlist-item px-6 py-5 ledger-line flex items-center gap-4 hover:bg-surface-container-low transition-colors cursor-pointer group">
<div class="w-12 h-12 rounded-full overflow-hidden shrink-0 border border-on-surface/10">
<img alt="Scout Profile Avatar" class="w-full h-full object-cover" data-alt="A sophisticated close-up portrait of a male fashion model with sharp cheekbones, wearing a minimalist black turtleneck against a stark white studio background. The lighting is high-key and editorial, creating a stark, modern light-mode aesthetic with crisp details." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAFD3FlMgWb9MbH88YUs5zDxvc5zDJ4CHUGXWm52MBUI6QWm1PCgcMA7zFv_QrDCvIlvrvs3YktxUf7evEi5rTxg10grPZYhx2BJKX8ssvzxmaE1s64xDLn1-R9_r_GNm4stMF3yCRNi2Icgsh-8qBgMvsU-ZENzRhr7cOsnCx3TgnCz45-kcoBER4MDLi84IEH5QjuMooLjfzXKJfAbzUj94JMh4B2-cWfokfZqvXEfsFcD6rV-iPOL7WQyJmdhiaGhMOevhakR9_b"/>
</div>
<div class="flex-1 min-w-0">
<h3 class="font-headline-md text-body-rt font-semibold text-on-surface truncate">Julian Thorne</h3>
<div class="mt-1 flex items-center gap-2">
<span class="font-stat-sm text-stat-sm text-on-surface-variant uppercase tracking-widest">AUD</span>
<span class="font-stat-sm text-stat-sm text-on-surface">2.4M</span>
</div>
</div>
<button aria-label="Remove Julian Thorne" class="remove-icon opacity-0 group-hover:opacity-100 p-2 text-outline hover:text-error transition-all">
<span class="material-symbols-outlined text-[20px]">remove</span>
</button>
</li>
<!-- Item 2: Elena Rostova -->
<li class="shortlist-item px-6 py-5 ledger-line flex items-center gap-4 hover:bg-surface-container-low transition-colors cursor-pointer group">
<div class="w-12 h-12 rounded-full overflow-hidden shrink-0 border border-on-surface/10">
<img alt="Scout Profile Avatar" class="w-full h-full object-cover" data-alt="An elegant, moody portrait of a female creative director with dark hair tied back, wearing a structured cream blazer. The setting is a minimalist, light-filled architectural space with sharp geometric shadows. The aesthetic is clean, professional, and high-end editorial." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDxiR2PsZNG_1mAVcsat5lySkFqVY-R58brA3c_HQd_lej-Y2ceSs4Ow_pB9Bg6jzd2-wkU09MOF4ljRMcEGY0AFSDqwSCQ3EGCDzDU-52FjyREKbPTZnh0_21_Tx1VneM3BXd-URZpfWjD6LX5PmKLMWqqgB2fJvLdajh0HIzPveJfkxiwkZ_wBbjtLJqqB_h8GEO6x3nFAt0QmvnDQ-9f3srROm2qS94dH7RcU8Q8oim2ZcSg2jRNFy8wKxv2THE4LpbCQ0cjfsoS"/>
</div>
<div class="flex-1 min-w-0">
<h3 class="font-headline-md text-body-rt font-semibold text-on-surface truncate">Elena Rostova</h3>
<div class="mt-1 flex items-center gap-2">
<span class="font-stat-sm text-stat-sm text-on-surface-variant uppercase tracking-widest">AUD</span>
<span class="font-stat-sm text-stat-sm text-on-surface">1.2M</span>
</div>
</div>

<span class="material-symbols-outlined text-[20px]">remove</span>

</ul>

<div class="hidden flex-1 flex-col items-center justify-center p-8 text-center" id="empty-state">
<span class="material-symbols-outlined text-6xl text-surface-dim mb-4" style="font-variation-settings: 'wght' 200;">folder_open</span>

</div>

<button class="w-full bg-[#6D28D9] hover:bg-primary text-white font-stat-sm text-stat-sm uppercase tracking-widest py-4 px-6 flex items-center justify-center gap-2 transition-colors duration-200">
<span class="material-symbols-outlined text-[18px]">file_download</span>
